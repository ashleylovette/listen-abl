  </header>

  <section class="hero" aria-labelledby="hero-title">
    <div class="hero-inner">
      <div class="hero-copy">
        <p class="eyebrow">New single</p>
        <h1 id="hero-title" class="title">
          <span class="title-line">Dirty Laundry —</span>
          <span class="title-line">Ashley Lovette</span>
        </h1>
        <p class="release" id="contact">Available 5/10 on all streaming platforms</p>
      </div>
      <div class="hero-frame">
        <div class="hero-photo-wrap">
          <img
            class="hero-img"
            src="hero-photo.png"
            width="600"
            height="600"
            alt="Studio setup"
          />
        </div>
      </div>
    </div>
  </section>
  </div>

  <section class="shows" aria-labelledby="live-shows-title">
    <div class="shows-inner">
      <h2 id="live-shows-title" class="shows-title">
        <span class="shows-title-line">Live</span>
        <span class="shows-title-line">Shows</span>
      </h2>
      <ul class="shows-list">
        @for (show of liveShows; track show.date + show.title) {
          <li class="show-item">
            <span class="show-date">{{ show.date }}</span>
            <div class="show-detail">
              <p class="show-title">{{ show.title }}</p>
              @if (show.venue) {
                <p class="show-venue">{{ show.venue }}</p>
              }
            </div>
          </li>
        }
      </ul>
    </div>
  </section>

  <router-outlet />
</div>
